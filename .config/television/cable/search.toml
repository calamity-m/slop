[metadata]
name = "search"
description = "A channel to search files based on their contents or filenames"
requirements = ["rg", "bat"]

[source]
command = [
  "rg . --hidden --no-heading --line-number --colors 'match:fg:white' --colors 'path:fg:blue' --color=always -g '!.git'",
  "rg . --files --no-heading --line-number --hidden --colors 'match:fg:white' --colors 'path:fg:blue' --color=always -g '!.git' | awk '{print $0 \":1:\" $0}'",
]
ansi = true
output = "{strip_ansi|split:\\::..2}"

[preview]
command = "bat -n --color=always '{strip_ansi|split:\\::0}'"
env = { BAT_THEME = "ansi" }
offset = '{strip_ansi|split:\::1}'

[ui]
preview_panel = { header = '{strip_ansi|split:\::..2}' }

[keybindings]
enter = "actions:edit"

[actions.edit]
description = "Open file in editor at line"
command = "${EDITOR:-vim} '+{strip_ansi|split:\\::1}' '{strip_ansi|split:\\::0}'"
shell = "bash"
mode = "execute"
